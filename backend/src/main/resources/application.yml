server:
  port: 8081

spring:
  application:
    name: backend
  
  # R2DBC MariaDB Configuration
  r2dbc:
    url: r2dbc:mariadb://${MARIADB_HOST:localhost}:${MARIADB_PORT:3306}/${MARIADB_DB:basedb}
    username: ${MARIADB_USER:devuser}
    password: ${MARIADB_PASSWORD:devpassword}

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Security Configuration (OAuth2/Keycloak)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/basedb}

# Keycloak Admin Client Configuration for Registration
keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:basedb}
  client-id: ${KEYCLOAK_CLIENT_ID:backend-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:super-secret-backend}

# Application Specific Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  registration:
    redirect-uri: ${REGISTRATION_REDIRECT_URI:http://localhost:5173/}

# Management Endpoints (Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
